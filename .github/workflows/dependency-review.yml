name: Dependency Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect dependency review support
        id: support
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          request = urllib.request.Request(
              f"{os.environ['GITHUB_API_URL']}/repos/{os.environ['GITHUB_REPOSITORY']}",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          with urllib.request.urlopen(request) as response:
              payload = json.load(response)

          security = payload.get("security_and_analysis") or {}
          dependency_graph = (security.get("dependency_graph") or {}).get("status") or "unsupported"
          advanced_security = (security.get("advanced_security") or {}).get("status") or "unsupported"
          supported = dependency_graph == "enabled" and advanced_security == "enabled"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"supported={'true' if supported else 'false'}\n")
              handle.write(f"dependency_graph_status={dependency_graph}\n")
              handle.write(f"advanced_security_status={advanced_security}\n")
          PY

      - name: Review dependency changes
        if: steps.support.outputs.supported == 'true'
        uses: actions/dependency-review-action@v4
        with:
          vulnerability-check: true
          license-check: false

      - name: Skip unsupported dependency review
        if: steps.support.outputs.supported != 'true'
        run: |
          echo "Skipping dependency review: dependency_graph=${{ steps.support.outputs.dependency_graph_status }}, advanced_security=${{ steps.support.outputs.advanced_security_status }}"
