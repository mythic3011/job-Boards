global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: crowdsec
    static_configs:
      - targets: ["crowdsec:6060"]

  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: "laravel"
    static_configs:
      - targets: ["laravel.test:80"]
    metrics_path: "/metrics"
    scrape_interval: 15s
