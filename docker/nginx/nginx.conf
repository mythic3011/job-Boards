worker_processes auto;
worker_rlimit_nofile 8192;

error_log /dev/stderr info;
error_log /var/log/nginx/error.log info;

pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /usr/local/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;

    # --- CrowdSec Lua bouncer (IP ban + AppSec) ---
    lua_package_path '/usr/local/lua/crowdsec/?.lua;;';
    lua_shared_dict crowdsec_cache 50m;
    lua_shared_dict crowdsec_state 1m;
    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

    init_by_lua_block {
        local state = ngx.shared.crowdsec_state
        local config_path = "/etc/crowdsec/bouncers/crowdsec-nginx-bouncer.conf"
        local key_path = "/crowdsec-keys/bouncer.key"
        local user_agent = "crowdsec-nginx-bouncer/v1.1.5"

        state:set("mode", "degraded")
        state:set("reason", "not_initialized")
        state:set("recovery_attempt", 0)

        local function read_ok(path)
            local handle = io.open(path, "r")
            if not handle then
                return false
            end
            handle:close()
            return true
        end

        local function classify_failure(err)
            local message = string.lower(tostring(err or "unknown"))

            if string.find(message, "bouncer.key", 1, true)
                or string.find(message, "api key", 1, true)
            then
                return "missing_key"
            end

            if string.find(message, "timeout", 1, true)
                or string.find(message, "connection refused", 1, true)
                or string.find(message, "no route to host", 1, true)
                or string.find(message, "name resolution", 1, true)
                or string.find(message, "host not found", 1, true)
                or string.find(message, "failed to connect", 1, true)
            then
                return "lapi_unreachable"
            end

            return "init_failed"
        end

        _G.bt_crowdsec_degrade = function(reason, detail)
            state:set("mode", "degraded")
            state:set("reason", reason or "init_failed")
            if detail and detail ~= "" then
                ngx.log(ngx.ERR, "[Crowdsec] degraded pass-through: " .. tostring(reason) .. ": " .. tostring(detail))
            else
                ngx.log(ngx.ERR, "[Crowdsec] degraded pass-through: " .. tostring(reason))
            end
        end

        _G.bt_crowdsec_activate = function(trigger)
            if not read_ok(key_path) then
                _G.bt_crowdsec_degrade("missing_key", "bouncer key is unavailable")
                cs = nil
                return nil, "missing_key"
            end

            if not read_ok(config_path) then
                _G.bt_crowdsec_degrade("config_missing", "bouncer config is unavailable")
                cs = nil
                return nil, "config_missing"
            end

            local ok, err = pcall(function()
                local candidate = require "crowdsec"
                local init_ok, init_err = candidate.init(config_path, user_agent)
                if init_ok == nil then
                    error(init_err or "unknown init failure")
                end
                cs = candidate
            end)

            if not ok then
                local reason = classify_failure(err)
                _G.bt_crowdsec_degrade(reason, err)
                cs = nil
                return nil, reason
            end

            state:set("mode", "active")
            state:set("reason", "")
            state:set("recovery_attempt", 0)
            ngx.log(ngx.NOTICE, "[Crowdsec] enforcement active (" .. tostring(trigger or "startup") .. ")")
            return true
        end

        local ok, reason = _G.bt_crowdsec_activate("startup")
        if not ok then
            ngx.log(ngx.WARN, "[Crowdsec] startup activation deferred: " .. tostring(reason))
            return
        end

        ngx.log(ngx.ALERT, "[Crowdsec] Initialisation done")
    }

    init_worker_by_lua_block {
        local state = ngx.shared.crowdsec_state
        local retry_interval_seconds = 5
        local retry_max_attempts = 12
        local recovery_attempts = 0
        local metrics_initialized = false

        local function setup_worker_runtime()
            if cs == nil then
                return nil, "crowdsec_not_loaded"
            end

            local ok, err = pcall(function()
                local mode = cs.get_mode()
                if string.lower(mode) == "stream" then
                    ngx.log(ngx.INFO, "Initializing stream mode for worker " .. tostring(ngx.worker.id()))
                    cs.SetupStream()
                end
                if ngx.worker.id() == 0 and not metrics_initialized then
                    ngx.log(ngx.INFO, "Initializing metrics for worker " .. tostring(ngx.worker.id()))
                    cs.SetupMetrics()
                    metrics_initialized = true
                end
            end)

            if not ok then
                _G.bt_crowdsec_degrade("worker_init_failed", err)
                cs = nil
                return nil, err
            end

            return true
        end

        local function ensure_enforcement(trigger)
            if cs ~= nil then
                return setup_worker_runtime()
            end

            local ok, reason = _G.bt_crowdsec_activate(trigger)
            if not ok then
                return nil, reason
            end

            recovery_attempts = 0
            return setup_worker_runtime()
        end

        ensure_enforcement("worker_init")

        local ok, err = ngx.timer.every(retry_interval_seconds, function(premature)
            if premature then
                return
            end

            if cs ~= nil then
                return
            end

            if recovery_attempts >= retry_max_attempts then
                state:set("recovery_attempt", recovery_attempts)
                return
            end

            recovery_attempts = recovery_attempts + 1
            state:set("recovery_attempt", recovery_attempts)

            local recovered, recover_err = ensure_enforcement("recovery_timer")
            if recovered then
                ngx.log(ngx.NOTICE, "[Crowdsec] recovered after " .. tostring(recovery_attempts) .. " retry attempt(s)")
                return
            end

            ngx.log(ngx.WARN, "[Crowdsec] recovery attempt " .. tostring(recovery_attempts) .. "/" .. tostring(retry_max_attempts) .. " failed: " .. tostring(recover_err))
        end)

        if not ok then
            _G.bt_crowdsec_degrade("recovery_timer_failed", err)
            cs = nil
            return
        end
    }

    # --- Internal IPs for monitoring ---
    geo $is_internal {
        default 0;
        127.0.0.1 1;
        192.168.0.0/16 1;
        100.122.13.62 1;
        100.71.55.114 1;
        100.114.61.64 1;
    }

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    log_format detailed '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        'rt=$request_time uct=$upstream_connect_time '
        'urt=$upstream_response_time '
        'cs=$upstream_cache_status '
        'rid=$request_id';

    map $request_id $blue_team_request_id {
        default $request_id;
        "" $http_x_request_id;
    }

    map $blue_team_request_id $blue_team_request_id_final {
        default $blue_team_request_id;
        "" "-";
    }

    map $uri $blue_team_trap_name {
        default "-";
        /.env env_probe;
        /.git/config git_probe;
        /phpmyadmin phpmyadmin_probe;
        /wp-login.php wp_probe;
        /admin-old admin_old_probe;
    }

    log_format blue_team_honeypot 'trap=web_decoy trap_name=$blue_team_trap_name '
        'source_ip=$remote_addr request_path=$request_uri '
        'request_id=$blue_team_request_id_final user_agent="$http_user_agent"';

    access_log /dev/stdout main;
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Request buffering
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_max_body_size 10m;

    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
    proxy_connect_timeout 10;
    proxy_send_timeout 30;
    proxy_read_timeout 60;

    # --- Rate Limiting Zones ---
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $http_x_forwarded_for zone=auth_user:10m rate=3r/s;
    limit_req_zone $binary_remote_addr zone=static:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # --- Connection Limiting Zones ---
    limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;

    limit_req_status 429;
    limit_conn_status 429;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Upstream — Laravel Sail container
    upstream laravel {
        server laravel.test:80;
        keepalive 16;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # --- HTTP → HTTPS redirect ---
    server {
        listen 80;
        server_name _;

        include /etc/nginx/includes/*.conf;

        location /up {
            proxy_pass http://laravel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            return 301 https://$host$request_uri;
        }

        location /upload {
            client_max_body_size 50m;
        }
    }

    # --- Main HTTPS server ---
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate /etc/nginx/ssl/selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        add_header X-Request-ID $request_id always;
        set $monitoring_auth_login_upstream http://auth-service:3000/login;
        set $monitoring_auth_verify_upstream http://auth-service:3000/verify;
        set $monitoring_auth_logout_upstream http://auth-service:3000/logout;
        set $monitoring_auth_check_upstream http://auth-service:3000/check;
        set $monitoring_auth_assets_upstream http://auth-service:3000/assets/;
        set $monitoring_grafana_public_upstream http://grafana:3000/monitoring/grafana/public/;
        set $monitoring_grafana_upstream http://grafana:3000/monitoring/grafana/;
        set $monitoring_prometheus_upstream http://prometheus:9090;

        # --- Security Headers ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Connection limit
        limit_conn per_ip_conn 20;

        header_filter_by_lua_block {
            local state = ngx.shared.crowdsec_state
            local mode = state:get("mode") or "unknown"
            local reason = state:get("reason") or ""
            local recovery_attempt = state:get("recovery_attempt")
            if mode == "active" and cs == nil then
                mode = "degraded"
                if reason == "" then
                    reason = "worker_not_ready"
                end
            end
            ngx.header["X-CrowdSec-Mode"] = mode
            if reason ~= "" then
                ngx.header["X-CrowdSec-Reason"] = reason
            end
            if recovery_attempt and recovery_attempt > 0 then
                ngx.header["X-CrowdSec-Recovery-Attempt"] = tostring(recovery_attempt)
            end
        }

        # --- CrowdSec Lua check (runs on every request) ---
        access_by_lua_block {
            local state = ngx.shared.crowdsec_state
            if state:get("mode") ~= "active" or cs == nil then
                return
            end

            local ok, err = pcall(function()
                cs.Allow(ngx.var.remote_addr)
            end)

            if not ok then
                _G.bt_crowdsec_degrade("allow_failed", err)
                cs = nil
            end
        }

        include /etc/nginx/includes/*.conf;

        # --- Auth endpoints ---
        location ~ ^/(login|register|password|two-factor|forgot-password) {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://laravel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-ID $request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # login page for monitoring
        location = /monitoring/login {
            allow all;
            limit_req zone=auth burst=5 nodelay;

            proxy_pass $monitoring_auth_login_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # auth verify endpoint
        location = /monitoring/auth/verify {
            allow all;
            limit_req zone=auth burst=5 nodelay;
            proxy_pass $monitoring_auth_verify_upstream;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Content-Type "application/json";
        }

        # logout
        location = /monitoring/auth/logout {
            allow all;
            proxy_pass $monitoring_auth_logout_upstream;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # session check internal
        location = /monitoring/auth/check {
            internal;
            proxy_pass $monitoring_auth_check_upstream;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
        }

        # --- Admin routes ---
        location /admin {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://laravel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # --- Install routes ---
        location /install {
            allow 127.0.0.1;
            allow 192.168.0.0/16;
            deny all;

            limit_req zone=auth burst=5 nodelay;

            proxy_pass http://laravel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # --- Assets for auth-service login UI ---
        location ^~ /monitoring/assets/ {
            limit_req zone=static burst=40 nodelay;

            proxy_pass $monitoring_auth_assets_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            proxy_cache_bypass $http_pragma;
        }

        # --- Grafana static assets (no auth required) ---
        location ^~ /monitoring/grafana/public/ {
            if ($is_internal = 0) { return 403; }

            proxy_pass $monitoring_grafana_public_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # --- Grafana ---
        location ^~ /monitoring/grafana/ {
            if ($is_internal = 0) { return 403; }

            auth_request /monitoring/auth/check;
            error_page 401 = @monitoring_login_redirect;

            proxy_pass $monitoring_grafana_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-WEBAUTH-USER "admin";
        }

        # --- Static assets ---
        location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|map)$ {
            limit_req zone=static burst=40 nodelay;

            proxy_pass http://laravel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            proxy_cache_bypass $http_pragma;
        }

        # --- Prometheus ---
        location /monitoring/prometheus/ {
            if ($is_internal = 0) { return 403; }

            auth_request /monitoring/auth/check;
            error_page 401 = @monitoring_login_redirect;

            rewrite ^/monitoring/prometheus/(.*)$ /$1 break;
            proxy_pass $monitoring_prometheus_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Livewire endpoint ---
        location /livewire {
            limit_req zone=general burst=30 nodelay;

            proxy_pass http://laravel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # --- Bot fingerprint trap endpoint ---
        location = /api/bot/fp-log {
            limit_req zone=api burst=2 nodelay;
            proxy_pass http://laravel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log /var/log/nginx/fp-trap.log main;
        }

        # --- All other routes ---
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://laravel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # redirect helper for monitoring login
        location @monitoring_login_redirect {
            return 302 /monitoring/login?redirect=$request_uri;
        }

        # Block dotfiles
        location ~ /\.(?!well-known) {
            deny all;
            return 404;
        }

        error_page 429 /429.html;
        location = /429.html {
            internal;
            root /usr/share/nginx/html;
        }

        error_page 500 502 503 504 520 521 522 523 524 /50x.html;
        location = /50x.html {
            internal;
            root /usr/share/nginx/html;
        }
    }
}
