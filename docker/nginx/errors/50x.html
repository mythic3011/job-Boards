<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Service Error</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .card {
            background: #1a1a2e;
            border: 1px solid #2d2d4e;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
        }
        .code { font-size: 4rem; font-weight: 700; color: #dc2626; line-height: 1; margin-bottom: 0.5rem; }
        h1 { font-size: 1.25rem; color: #c9b8e8; font-weight: 600; margin-bottom: 0.75rem; }
        p { color: #888; font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.5rem; }
        .meta {
            background: rgba(220,38,38,0.08);
            border: 1px solid rgba(220,38,38,0.2);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 1.5rem;
            font-family: monospace;
        }
        .retry-btn {
            display: inline-block;
            color: #dc2626;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid rgba(220,38,38,0.4);
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            background: none;
            transition: background 0.2s;
        }
        .retry-btn:hover { background: rgba(220,38,38,0.08); }
        .footer { margin-top: 1.5rem; font-size: 0.75rem; color: #444; }
    </style>
</head>
<body>
    <div class="card">
        <div class="code">50x</div>
        <h1>Service Unavailable</h1>
        <p>Something went wrong on our end. The team has been notified and is looking into it.</p>
        <div class="meta">Time: <span id="ts"></span></div>
        <button class="retry-btn" onclick="window.location.reload()">Retry</button>
        <div class="footer">If this persists, contact the administrator</div>
    </div>
    <script>
        document.getElementById('ts').textContent = new Date().toUTCString();
    </script>
</body>
</html>
