<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="robots" content="noindex, nofollow" />
        <title>Service Error</title>
        <link rel="stylesheet" href="/_error/styles.css" />
    </head>
    <body>
        <main class="surface card">
            <div class="pill pill--danger">Service interruption</div>
            <div class="code code--error">50x</div>
            <h1>Service unavailable</h1>
            <p>
                Something went wrong upstream. The request reached the front
                door, but the application stack did not complete cleanly.
            </p>
            <div class="meta">Time: <span id="ts"></span></div>
            <div class="actions">
                <button class="action action--primary retry-btn" onclick="window.location.reload()">
                    Retry request
                </button>
                <a href="/" class="action action--secondary">Return home</a>
            </div>
            <p class="footer">
                If this persists, inspect nginx upstream health and application
                logs.
            </p>
        </main>
        <script>
            document.getElementById("ts").textContent =
                new Date().toUTCString();
        </script>
    </body>
</html>
