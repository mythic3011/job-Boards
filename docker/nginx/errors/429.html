<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="robots" content="noindex, nofollow" />
        <title>429 Try Again Soon</title>
        <link rel="stylesheet" href="/_error/styles.css" />
    </head>
    <body>
        <main class="surface card card--wide">
            <div class="pill pill--warning">Request paused</div>
            <div class="code code--warning">429</div>
            <h1>Try again soon</h1>
            <p>
                This request cannot be completed right now because too many
                attempts were made in a short period.
            </p>
            <div class="countdown" id="countdown">Retry in <span id="timer">30</span>s</div>
            <p class="reference">
                Request ID: <span class="reference-id" id="request-id"></span>
            </p>
            <div class="actions">
                <a href="/" class="action action--secondary retry-link" id="retry-link">Try again</a>
            </div>
            <p class="footer">
                Wait for the cooldown to end, then try again. If the problem
                continues, share the request ID with support.
            </p>
        </main>
        <script>
            (function () {
                var s = 30;
                var timer = document.getElementById("timer");
                var countdown = document.getElementById("countdown");
                var link = document.getElementById("retry-link");
                var iv = setInterval(function () {
                    s--;
                    timer.textContent = s;
                    if (s <= 0) {
                        clearInterval(iv);
                        countdown.style.display = "none";
                        link.style.display = "inline-flex";
                    }
                }, 1000);
            })();
        </script>
    </body>
</html>
