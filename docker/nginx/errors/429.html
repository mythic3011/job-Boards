<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="robots" content="noindex, nofollow" />
        <title>429 Too Many Requests</title>
        <link rel="stylesheet" href="/_error/styles.css" />
    </head>
    <body>
        <main class="surface card">
            <div class="pill pill--warning">Rate limited</div>
            <div class="code code--warning">429</div>
            <h1>Too many requests</h1>
            <p>
                The front door is throttling this client because too many
                requests arrived in a short period.
            </p>
            <div class="countdown" id="countdown">Retry in <span id="timer">30</span>s</div>
            <div class="actions">
                <a href="/" class="action action--secondary retry-link" id="retry-link">Try again</a>
            </div>
            <p class="footer">
                Slow down and retry after the cooldown window clears.
            </p>
        </main>
        <script>
            (function () {
                var s = 30;
                var timer = document.getElementById("timer");
                var countdown = document.getElementById("countdown");
                var link = document.getElementById("retry-link");
                var iv = setInterval(function () {
                    s--;
                    timer.textContent = s;
                    if (s <= 0) {
                        clearInterval(iv);
                        countdown.style.display = "none";
                        link.style.display = "inline-flex";
                    }
                }, 1000);
            })();
        </script>
    </body>
</html>
