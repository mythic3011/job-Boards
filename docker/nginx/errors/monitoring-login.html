<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Monitoring Access</title>
        <link rel="stylesheet" href="/styles.css" />
    </head>
    <body>
        <div class="card card--form">
            <div class="logo">
                <h1>🛡️ Monitoring Access</h1>
                <p>JobBoard Infrastructure</p>
            </div>

            <div class="error" id="error"></div>

            <div class="form-group">
                <label>Username</label>
                <input
                    type="text"
                    id="username"
                    autocomplete="username"
                    autofocus
                />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    autocomplete="current-password"
                />
            </div>

            <button id="submit" onclick="login()">Access Monitoring</button>

            <div class="footer footer--centered">
                Restricted access · All attempts logged
            </div>
        </div>

        <script>
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get("redirect") || "/monitoring/grafana/";

            document
                .getElementById("password")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter") login();
                });

            async function login() {
                const btn = document.getElementById("submit");
                const err = document.getElementById("error");

                btn.disabled = true;
                btn.textContent = "Verifying...";
                err.style.display = "none";

                try {
                    const res = await fetch("/monitoring/auth/verify", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            username: document.getElementById("username").value,
                            password: document.getElementById("password").value,
                        }),
                    });

                    if (res.ok) {
                        window.location.href = redirect;
                    } else {
                        err.textContent = "Invalid credentials. Access denied.";
                        err.style.display = "block";
                        btn.disabled = false;
                        btn.textContent = "Access Monitoring";
                        document.getElementById("password").value = "";
                    }
                } catch (e) {
                    err.textContent = "Connection error. Try again.";
                    err.style.display = "block";
                    btn.disabled = false;
                    btn.textContent = "Access Monitoring";
                }
            }
        </script>
    </body>
</html>
