<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Monitoring Access</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0f0f1a;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }

            .card {
                background: #1a1a2e;
                border: 1px solid #2d2d4e;
                border-radius: 12px;
                padding: 2.5rem;
                width: 100%;
                max-width: 380px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            }

            .logo {
                text-align: center;
                margin-bottom: 2rem;
            }

            .logo h1 {
                font-size: 1.25rem;
                color: #c9b8e8;
                font-weight: 600;
            }

            .logo p {
                font-size: 0.8rem;
                color: #666;
                margin-top: 0.25rem;
            }

            .form-group {
                margin-bottom: 1.25rem;
            }

            label {
                display: block;
                font-size: 0.8rem;
                color: #888;
                margin-bottom: 0.5rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            input {
                width: 100%;
                padding: 0.75rem 1rem;
                background: #0f0f1a;
                border: 1px solid #2d2d4e;
                border-radius: 8px;
                color: #fff;
                font-size: 0.95rem;
                transition: border-color 0.2s;
            }

            input:focus {
                outline: none;
                border-color: #c9b8e8;
            }

            button {
                width: 100%;
                padding: 0.85rem;
                background: #c9b8e8;
                color: #0f0f1a;
                border: none;
                border-radius: 8px;
                font-size: 0.95rem;
                font-weight: 600;
                cursor: pointer;
                margin-top: 0.5rem;
                transition: opacity 0.2s;
            }

            button:hover {
                opacity: 0.9;
            }
            button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .error {
                background: rgba(255, 80, 80, 0.1);
                border: 1px solid rgba(255, 80, 80, 0.3);
                color: #ff6b6b;
                padding: 0.75rem 1rem;
                border-radius: 8px;
                font-size: 0.85rem;
                margin-bottom: 1rem;
                display: none;
            }

            .footer {
                text-align: center;
                margin-top: 1.5rem;
                font-size: 0.75rem;
                color: #444;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="logo">
                <h1>🛡️ Monitoring Access</h1>
                <p>JobBoard Infrastructure</p>
            </div>

            <div class="error" id="error"></div>

            <div class="form-group">
                <label>Username</label>
                <input
                    type="text"
                    id="username"
                    autocomplete="username"
                    autofocus
                />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    autocomplete="current-password"
                />
            </div>

            <button id="submit" onclick="login()">Access Monitoring</button>

            <div class="footer">Restricted access · All attempts logged</div>
        </div>

        <script>
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get("redirect") || "/monitoring/grafana/";

            document
                .getElementById("password")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter") login();
                });

            async function login() {
                const btn = document.getElementById("submit");
                const err = document.getElementById("error");

                btn.disabled = true;
                btn.textContent = "Verifying...";
                err.style.display = "none";

                try {
                    const res = await fetch("/monitoring/auth/verify", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            username: document.getElementById("username").value,
                            password: document.getElementById("password").value,
                        }),
                    });

                    if (res.ok) {
                        window.location.href = redirect;
                    } else {
                        err.textContent = "Invalid credentials. Access denied.";
                        err.style.display = "block";
                        btn.disabled = false;
                        btn.textContent = "Access Monitoring";
                        document.getElementById("password").value = "";
                    }
                } catch (e) {
                    err.textContent = "Connection error. Try again.";
                    err.style.display = "block";
                    btn.disabled = false;
                    btn.textContent = "Access Monitoring";
                }
            }
        </script>
    </body>
</html>
