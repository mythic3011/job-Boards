type: leaky
name: local/laravel-bf
description: "Detect brute force against Laravel login (419 CSRF/rate-limit responses)"
filter: >
  evt.Meta.log_type == 'http_access-log' &&
  evt.Parsed.verb == 'POST' &&
  evt.Parsed.uri contains '/login' &&
  (evt.Meta.http_status == '419' || evt.Meta.http_status == '422')
groupby: evt.Meta.source_ip
capacity: 5
leakspeed: "30s"
blackhole: 30m
labels:
  confidence: 3
  spoofable: 0
  classification:
    - attack.T1110
  behavior: "http:bruteforce"
  label: "Laravel Login Bruteforce"
  service: http
  remediation: true
