apiVersion: 1

datasources:
  - name: Prometheus
    orgId: 1
    uid: PBFA97CFB590B2093
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    basicAuth: true
    basicAuthUser: $GRAFANA_PROMETHEUS_USER
    secureJsonData:
      basicAuthPassword: $GRAFANA_PROMETHEUS_SECRET
    isDefault: true
    editable: true
  - name: Loki
    orgId: 1
    uid: P8E80F9AEF21F6940
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
  - name: Postgres
    orgId: 1
    uid: P8E949C5F1FC6F134
    type: postgres
    access: proxy
    url: $GRAFANA_POSTGRES_URL
    user: $GRAFANA_POSTGRES_USER
    secureJsonData:
      password: $GRAFANA_POSTGRES_SECRET
    jsonData:
      database: $GRAFANA_POSTGRES_DATABASE
      sslmode: $GRAFANA_POSTGRES_SSLMODE
      postgresVersion: 1500
      timescaledb: false
    editable: true
