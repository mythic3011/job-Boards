services:
    nginx:
        container_name: jobs-borads-nginx
        image: nginx:alpine
        entrypoint: ["/docker-entrypoint-custom.sh"]
        ports:
            - "${APP_PORT:-80}:80"
            - "${APP_SSL_PORT:-443}:443"
        environment:
            MONITORING_PASSWORD: "${MONITORING_PASSWORD}"
        volumes:
            - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./docker/nginx/entrypoint.sh:/docker-entrypoint-custom.sh:ro
            - ./docker/nginx/errors:/usr/share/nginx/html:ro # static error pages
            - nginx-ssl:/etc/nginx/ssl
            - nginx-logs:/var/log/nginx
            - nginx-htpasswd:/etc/nginx/htpasswd
        networks:
            - sail
        depends_on:
            - laravel.test
            - crowdsec-bouncer
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "curl -sf http://laravel.test:80/up || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 15s

    crowdsec:
        container_name: jobs-borads-crowdsec
        image: crowdsecurity/crowdsec:latest
        environment:
            COLLECTIONS: >-
                crowdsecurity/nginx
                crowdsecurity/http-cve
                crowdsecurity/base-http-scenarios
            GID: "1000"
            DISABLE_PARSERS: "crowdsecurity/whitelists"
        volumes:
            - ./docker/crowdsec/acquis.d/nginx.yaml:/etc/crowdsec/acquis.d/nginx.yaml:ro
            - ./docker/crowdsec/acquis.d/laravel.yaml:/etc/crowdsec/acquis.d/laravel.yaml:ro
            - ./docker/crowdsec/parsers/s02-enrich/whitelists.yaml:/etc/crowdsec/parsers/s02-enrich/local-whitelists.yaml:ro
            - ./docker/crowdsec/scenarios/laravel-bf.yaml:/etc/crowdsec/scenarios/laravel-bf.yaml:ro
            - nginx-logs:/var/log/nginx:ro
            - laravel-logs:/var/log/laravel:ro
            - crowdsec-db:/var/lib/crowdsec/data
            - crowdsec-config:/etc/crowdsec
            - crowdsec-keys:/crowdsec-keys
        networks:
            - sail
        depends_on:
            laravel.test:
                condition: service_started
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "test -f /etc/crowdsec/config.yaml && cscli version || exit 1",
                ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 60s

    crowdsec-key-init:
        container_name: jobs-borads-crowdsec-key-init
        image: crowdsecurity/crowdsec:latest
        entrypoint: ["/init-bouncer-key.sh"]
        volumes:
            - ./docker/crowdsec/init-bouncer-key.sh:/init-bouncer-key.sh:ro
            - crowdsec-db:/var/lib/crowdsec/data
            - crowdsec-config:/etc/crowdsec
            - crowdsec-keys:/crowdsec-keys
        networks:
            - sail
        depends_on:
            crowdsec:
                condition: service_healthy
        restart: on-failure

    crowdsec-bouncer:
        container_name: jobs-borads-crowdsec-bouncer
        build:
            context: ./docker/crowdsec
            dockerfile: Dockerfile.bouncer
        environment:
            CROWDSEC_AGENT_HOST: crowdsec:8080
            GIN_MODE: release
            PORT: "8080"
        volumes:
            - crowdsec-keys:/crowdsec-keys:ro
        networks:
            - sail
        depends_on:
            crowdsec-key-init:
                condition: service_completed_successfully
        restart: unless-stopped

    prometheus:
        container_name: jobs-borads-prometheus
        image: prom/prometheus:latest
        volumes:
            - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus-data:/prometheus
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=7d"
        networks:
            - sail
        restart: unless-stopped

    grafana:
        container_name: jobs-borads-grafana
        image: grafana/grafana:latest
        environment:
            GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD}"
            GF_USERS_ALLOW_SIGN_UP: "false"
            GF_SERVER_ROOT_URL: "https://%(domain)s/monitoring/grafana/"
            GF_SERVER_SERVE_FROM_SUB_PATH: "true"
            GF_AUTH_ANONYMOUS_ENABLED: "false"
            GF_SECURITY_DISABLE_GRAVATAR: "true"
        volumes:
            - grafana-data:/var/lib/grafana
            - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
        networks:
            - sail
        depends_on:
            - prometheus
        restart: unless-stopped

    laravel.test:
        container_name: jobs-borads-laravel.test
        build:
            context: .
            dockerfile: docker/Dockerfile.sail
            args:
                WWWGROUP: ${WWWGROUP}
                INSTALL_PLAYWRIGHT: "false"
                INSTALL_BUN: "false"
        image: sail-8.5/app
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "127.0.0.1:${VITE_PORT:-5173}:${VITE_PORT:-5173}"
        environment:
            WWWUSER: ${WWWUSER}
            LARAVEL_SAIL:
            XDEBUG_MODE: ${SAIL_XDEBUG_MODE:-off}
            XDEBUG_CONFIG: ${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}
            IGNITION_LOCAL_SITES_PATH: ${PWD}
            DB_HOST: postgres
            REDIS_HOST: redis
        volumes:
            - ".:/var/www/html"
            - laravel-logs:/var/log/laravel
        networks:
            - sail
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy

    postgres:
        container_name: jobs-borads-postgres
        image: postgres:15-alpine
        ports:
            - "127.0.0.1:${FORWARD_DB_PORT:-5432}:5432"
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - sail-postgres:/var/lib/postgresql/data
        networks:
            - sail
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE} -h localhost || exit 1",
                ]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 10s

    redis:
        container_name: jobs-borads-redis
        image: redis:alpine
        ports:
            - "127.0.0.1:${FORWARD_REDIS_PORT:-6379}:6379"
        volumes:
            - sail-redis:/data
        networks:
            - sail
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 3
            start_period: 5s

networks:
    sail:
        driver: bridge

volumes:
    sail-postgres:
        driver: local
    sail-redis:
        driver: local
    nginx-ssl:
        driver: local
    nginx-logs:
        driver: local
    nginx-htpasswd:
        driver: local
    laravel-logs:
        driver: local
    crowdsec-db:
        driver: local
    crowdsec-config:
        driver: local
    crowdsec-keys:
        driver: local
    prometheus-data:
        driver: local
    grafana-data:
        driver: local
