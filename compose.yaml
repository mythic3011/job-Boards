services:
  laravel.test:
    build:
      context: .
      dockerfile: docker/Dockerfile.sail
      args:
        WWWGROUP: ${WWWGROUP}
        INSTALL_PLAYWRIGHT: 'false'
        INSTALL_BUN: 'false'
    image: sail-8.5/app
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '127.0.0.1:${APP_PORT:-80}:80'
      - '127.0.0.1:${VITE_PORT:-5173}:${VITE_PORT:-5173}'
    environment:
      WWWUSER: ${WWWUSER}
      LARAVEL_SAIL: 1
      XDEBUG_MODE: ${SAIL_XDEBUG_MODE:-off}
      XDEBUG_CONFIG: ${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}
      IGNITION_LOCAL_SITES_PATH: ${PWD}
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - '.:/var/www/html'
    networks:
      - sail
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    ports:
      - '127.0.0.1:${FORWARD_DB_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - sail-postgres:/var/lib/postgresql/data
    networks:
      - sail
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE} -h localhost || exit 1']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:alpine
    ports:
      - '127.0.0.1:${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - sail-redis:/data
    networks:
      - sail
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  sail:
    driver: bridge

volumes:
  sail-postgres:
    driver: local
  sail-redis:
    driver: local
