services:
    nginx:
        container_name: jobs-boards-nginx
        labels:
            - dev.orbstack.domains=jobboard.local
            - dev.orbstack.https-port=443
        build:
            context: ./docker/nginx
            dockerfile: Dockerfile
        ports:
            - "${APP_PORT:-80}:80"
            - "${APP_SSL_PORT:-443}:443"
        environment:
            MONITORING_PASSWORD: "${MONITORING_PASSWORD}"
        volumes:
            - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./docker/nginx/crowdsec-bouncer.conf.template:/etc/nginx/crowdsec-bouncer.conf.template:ro
            - ./docker/nginx/errors:/usr/share/nginx/html:ro
            - nginx-ssl:/etc/nginx/ssl
            - nginx-htpasswd:/etc/nginx/htpasswd
            - nginx-logs:/var/log/nginx
            - crowdsec-keys:/crowdsec-keys:ro
        networks:
            - sail
        depends_on:
            laravel.test:
                condition: service_started
            crowdsec-key-init:
                condition: service_completed_successfully
            crowdsec:
                condition: service_healthy
            grafana:
                condition: service_healthy
            auth-service:
                condition: service_healthy
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "curl -sf http://laravel.test:80/up || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 15s

    auth-service:
        build: ./docker/auth-service
        environment:
            - MONITORING_ADMIN_USERNAME=${MONITORING_ADMIN_USERNAME}
            - MONITORING_PASSWORD_HASH=${MONITORING_PASSWORD_HASH}
            - SESSION_SECRET=${SESSION_SECRET}
        networks:
            - sail
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
            interval: 10s
            timeout: 5s
            retries: 3

    crowdsec:
        container_name: jobs-boards-crowdsec
        image: crowdsecurity/crowdsec:latest
        environment:
            COLLECTIONS: >-
                crowdsecurity/nginx
                crowdsecurity/http-cve
                crowdsecurity/base-http-scenarios
                crowdsecurity/appsec-virtual-patching
                crowdsecurity/appsec-generic-rules
            GID: "1000"
            DISABLE_PARSERS: "crowdsecurity/whitelists"
        volumes:
            - ./docker/crowdsec/acquis.d/nginx.yaml:/etc/crowdsec/acquis.d/nginx.yaml:ro
            - ./docker/crowdsec/acquis.d/laravel.yaml:/etc/crowdsec/acquis.d/laravel.yaml:ro
            - ./docker/crowdsec/acquis.d/appsec.yaml:/etc/crowdsec/acquis.d/appsec.yaml:ro
            - ./docker/crowdsec/parsers/s02-enrich/whitelists.yaml:/etc/crowdsec/parsers/s02-enrich/local-whitelists.yaml:ro
            - ./docker/crowdsec/scenarios/laravel-bf.yaml:/etc/crowdsec/scenarios/laravel-bf.yaml:ro
            - ./docker/crowdsec/scenarios/path-scanner.yaml:/etc/crowdsec/scenarios/path-scanner.yaml:ro
            - nginx-logs:/var/log/nginx:ro
            - ./storage/logs:/var/log/laravel:ro
            - crowdsec-db:/var/lib/crowdsec/data
            - crowdsec-config:/etc/crowdsec
            - crowdsec-keys:/crowdsec-keys
            - crowdsec-logs:/var/log/crowdsec
        networks:
            - sail
        depends_on:
            laravel.test:
                condition: service_started
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "test -f /etc/crowdsec/config.yaml && cscli version || exit 1",
                ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 60s

    crowdsec-key-init:
        container_name: jobs-boards-crowdsec-key-init
        image: crowdsecurity/crowdsec:latest
        entrypoint: ["/init-bouncer-key.sh"]
        volumes:
            - ./docker/crowdsec/init-bouncer-key.sh:/init-bouncer-key.sh:ro
            - crowdsec-db:/var/lib/crowdsec/data
            - crowdsec-config:/etc/crowdsec
            - crowdsec-keys:/crowdsec-keys
        networks:
            - sail
        depends_on:
            crowdsec:
                condition: service_healthy
        restart: on-failure

    prometheus:
        container_name: jobs-boards-prometheus
        image: prom/prometheus:latest
        environment:
            PROMETHEUS_PASSWORD_HASH: "${PROMETHEUS_PASSWORD_HASH:-}"
        volumes:
            - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - ${PROMETHEUS_WEB_CONFIG_FILE:-./docker/prometheus/web-config.yml}:/etc/prometheus/web-config.yml:ro
            - prometheus-data:/prometheus
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=7d"
            - "--web.config.file=/etc/prometheus/web-config.yml"
        networks:
            - sail
        restart: unless-stopped

    nginx-exporter:
        container_name: jobs-boards-nginx-exporter
        image: nginx/nginx-prometheus-exporter:latest
        command:
            - "--nginx.scrape-uri=http://nginx:9113/metrics"
        networks:
            - sail
        depends_on:
            nginx:
                condition: service_started
        restart: unless-stopped

    loki:
        container_name: jobs-boards-loki
        image: grafana/loki:latest
        command: -config.file=/etc/loki/local-config.yaml
        volumes:
            - ./docker/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
            - loki-data:/loki
        networks:
            - sail
        restart: unless-stopped
        healthcheck:
            disable: true

    promtail:
        container_name: jobs-boards-promtail
        image: grafana/promtail:latest
        command: -config.file=/etc/promtail/config.yaml
        volumes:
            - ./docker/promtail/config.yaml:/etc/promtail/config.yaml:ro
            - nginx-logs:/var/log/nginx:ro
            - ./storage/logs:/var/log/laravel:ro
            - crowdsec-logs:/var/log/crowdsec:ro
            - promtail-positions:/var/lib/promtail
        networks:
            - sail
        depends_on:
            loki:
                condition: service_started
        restart: unless-stopped

    grafana:
        container_name: jobs-boards-grafana
        image: grafana/grafana:latest
        environment:
            GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD}"
            GF_USERS_ALLOW_SIGN_UP: "false"
            GF_SERVER_ROOT_URL: "https://%(domain)s/monitoring/grafana/"
            GF_SERVER_SERVE_FROM_SUB_PATH: "true"
            GF_AUTH_ANONYMOUS_ENABLED: "false"
            GF_SECURITY_DISABLE_GRAVATAR: "true"
            GF_AUTH_PROXY_ENABLED: "true"
            GF_AUTH_PROXY_HEADER_NAME: "X-WEBAUTH-USER"
            GF_AUTH_PROXY_HEADER_PROPERTY: "username"
            GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
            GF_AUTH_PROXY_HEADERS: "Name:X-WEBAUTH-USER"
            DB_DATABASE: "${DB_DATABASE}"
            DB_USERNAME: "${DB_USERNAME}"
            DB_PASSWORD: "${DB_PASSWORD}"
        volumes:
            - grafana-data:/var/lib/grafana
            - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
        networks:
            - sail
        depends_on:
            - prometheus
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -qO- http://localhost:3000/api/health || exit 1",
                ]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 30s

    laravel.test:
        container_name: jobs-boards-laravel.test
        build:
            context: .
            dockerfile: docker/Dockerfile.sail
            args:
                WWWGROUP: ${WWWGROUP}
                INSTALL_PLAYWRIGHT: "false"
                INSTALL_BUN: "false"
        image: sail-8.5/app
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "127.0.0.1:${VITE_PORT:-5173}:${VITE_PORT:-5173}"
        environment:
            WWWUSER: ${WWWUSER}
            LARAVEL_SAIL:
            XDEBUG_MODE: ${SAIL_XDEBUG_MODE:-off}
            XDEBUG_CONFIG: ${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}
            IGNITION_LOCAL_SITES_PATH: ${PWD}
            DB_HOST: postgres
            DB_SSLMODE: ${DB_SSLMODE:-prefer}
            REDIS_HOST: redis
        volumes:
            - ".:/var/www/html"
        networks:
            - sail
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy

    queue-worker:
        container_name: jobs-boards-queue-worker
        build:
            context: .
            dockerfile: docker/Dockerfile.sail
            args:
                WWWGROUP: ${WWWGROUP}
                INSTALL_PLAYWRIGHT: "false"
                INSTALL_BUN: "false"
        image: sail-8.5/app
        entrypoint:
            [
                "php",
                "artisan",
                "queue:work",
                "--sleep=1",
                "--tries=3",
                "--backoff=10",
                "--timeout=300",
            ]
        environment:
            WWWUSER: ${WWWUSER}
            LARAVEL_SAIL:
            DB_HOST: postgres
            DB_SSLMODE: ${DB_SSLMODE:-prefer}
            REDIS_HOST: redis
        volumes:
            - ".:/var/www/html"
        networks:
            - sail
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "ps aux | grep -q '[p]hp artisan queue:work' || exit 1",
                ]
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 20s
        restart: unless-stopped

    postgres:
        container_name: jobs-boards-postgres
        image: postgres:15-alpine
        ports:
            - "127.0.0.1:${FORWARD_DB_PORT:-5432}:5432"
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - sail-postgres:/var/lib/postgresql/data
        networks:
            - sail
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE} -h localhost || exit 1",
                ]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 10s

    redis:
        container_name: jobs-boards-redis
        image: redis:alpine
        ports:
            - "127.0.0.1:${FORWARD_REDIS_PORT:-6379}:6379"
        volumes:
            - sail-redis:/data
        networks:
            - sail
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 3
            start_period: 5s

networks:
    sail:
        driver: bridge

volumes:
    sail-postgres:
        driver: local
    sail-redis:
        driver: local
    nginx-ssl:
        driver: local
    nginx-htpasswd:
        driver: local
    nginx-logs:
        driver: local
    crowdsec-db:
        driver: local
    crowdsec-config:
        driver: local
    crowdsec-keys:
        driver: local
    crowdsec-logs:
        driver: local
    prometheus-data:
        driver: local
    loki-data:
        driver: local
    promtail-positions:
        driver: local
    grafana-data:
        driver: local
