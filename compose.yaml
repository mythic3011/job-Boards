services:
    nginx:
        image: nginx:alpine
        entrypoint: ["/docker-entrypoint-custom.sh"]
        ports:
            - "${APP_PORT:-80}:80"
            - "${APP_SSL_PORT:-443}:443"
        volumes:
            - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./docker/nginx/entrypoint.sh:/docker-entrypoint-custom.sh:ro
            - nginx-ssl:/etc/nginx/ssl
            - nginx-logs:/var/log/nginx
        networks:
            - sail
        depends_on:
            - laravel.test
            - crowdsec-bouncer
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "curl -skf https://localhost/up || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 15s

    crowdsec:
        image: crowdsecurity/crowdsec:latest
        environment:
            COLLECTIONS: >-
                crowdsecurity/nginx
                crowdsecurity/http-cve
                crowdsecurity/base-http-scenarios
            GID: "1000"
        volumes:
            - ./docker/crowdsec/acquis.d/nginx.yaml:/etc/crowdsec/acquis.d/nginx.yaml:ro
            - ./docker/crowdsec/acquis.d/laravel.yaml:/etc/crowdsec/acquis.d/laravel.yaml:ro
            - nginx-logs:/var/log/nginx:ro
            - laravel-logs:/var/log/laravel:ro
            - crowdsec-db:/var/lib/crowdsec/data
            - crowdsec-config:/etc/crowdsec
            - crowdsec-keys:/crowdsec-keys
        networks:
            - sail
        depends_on:
            laravel.test:
                condition: service_started
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "test -f /etc/crowdsec/config.yaml && cscli version || exit 1",
                ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 60s

    crowdsec-key-init:
        image: crowdsecurity/crowdsec:latest
        entrypoint: ["/init-bouncer-key.sh"]
        volumes:
            - ./docker/crowdsec/init-bouncer-key.sh:/init-bouncer-key.sh:ro
            - crowdsec-db:/var/lib/crowdsec/data
            - crowdsec-config:/etc/crowdsec
            - crowdsec-keys:/crowdsec-keys
        networks:
            - sail
        depends_on:
            crowdsec:
                condition: service_healthy
        restart: on-failure

    crowdsec-bouncer:
        build:
            context: ./docker/crowdsec
            dockerfile: Dockerfile.bouncer
        environment:
            CROWDSEC_AGENT_HOST: crowdsec:8080
            GIN_MODE: release
            PORT: "8080"
        volumes:
            - crowdsec-keys:/crowdsec-keys:ro
        networks:
            - sail
        depends_on:
            crowdsec-key-init:
                condition: service_completed_successfully
        restart: unless-stopped

    laravel.test:
        build:
            context: .
            dockerfile: docker/Dockerfile.sail
            args:
                WWWGROUP: ${WWWGROUP}
                INSTALL_PLAYWRIGHT: "false"
                INSTALL_BUN: "false"
        image: sail-8.5/app
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "127.0.0.1:${VITE_PORT:-5173}:${VITE_PORT:-5173}"
        environment:
            WWWUSER: ${WWWUSER}
            LARAVEL_SAIL:
            XDEBUG_MODE: ${SAIL_XDEBUG_MODE:-off}
            XDEBUG_CONFIG: ${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}
            IGNITION_LOCAL_SITES_PATH: ${PWD}
            DB_HOST: postgres
            REDIS_HOST: redis
        volumes:
            - ".:/var/www/html"
            - laravel-logs:/var/log/laravel
        networks:
            - sail
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy

    postgres:
        image: postgres:15-alpine
        ports:
            - "127.0.0.1:${FORWARD_DB_PORT:-5432}:5432"
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - sail-postgres:/var/lib/postgresql/data
        networks:
            - sail
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE} -h localhost || exit 1",
                ]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 10s

    redis:
        image: redis:alpine
        ports:
            - "127.0.0.1:${FORWARD_REDIS_PORT:-6379}:6379"
        volumes:
            - sail-redis:/data
        networks:
            - sail
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 3
            start_period: 5s

networks:
    sail:
        driver: bridge

volumes:
    sail-postgres:
        driver: local
    sail-redis:
        driver: local
    nginx-ssl:
        driver: local
    nginx-logs:
        driver: local
    laravel-logs:
        driver: local
    crowdsec-db:
        driver: local
    crowdsec-config:
        driver: local
    crowdsec-keys:
        driver: local
